<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grey Grid Dots</title>
    <style>
        /* Reset and base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        /* Main grid container */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            gap: 20px;
            padding: 30px;
            max-width: 900px;
            width: 100%;
        }

        /* Each dot */
        .dot {
            aspect-ratio: 1 / 1;
            width: 100%;
            border-radius: 50%;
            background: #3a3a3a;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            box-shadow: 0 0 10px rgba(100, 100, 100, 0.1);
            animation: pulse 2s ease-in-out infinite;
        }

        /* Different animation delays for each dot */
        .dot:nth-child(1) { animation-delay: 0.0s; }
        .dot:nth-child(2) { animation-delay: 0.1s; }
        .dot:nth-child(3) { animation-delay: 0.2s; }
        .dot:nth-child(4) { animation-delay: 0.3s; }
        .dot:nth-child(5) { animation-delay: 0.4s; }
        .dot:nth-child(6) { animation-delay: 0.5s; }
        .dot:nth-child(7) { animation-delay: 0.6s; }
        .dot:nth-child(8) { animation-delay: 0.7s; }
        .dot:nth-child(9) { animation-delay: 0.8s; }
        .dot:nth-child(10) { animation-delay: 0.9s; }
        .dot:nth-child(11) { animation-delay: 1.0s; }
        .dot:nth-child(12) { animation-delay: 1.1s; }
        .dot:nth-child(13) { animation-delay: 1.2s; }
        .dot:nth-child(14) { animation-delay: 1.3s; }
        .dot:nth-child(15) { animation-delay: 1.4s; }
        .dot:nth-child(16) { animation-delay: 1.5s; }
        .dot:nth-child(17) { animation-delay: 1.6s; }
        .dot:nth-child(18) { animation-delay: 1.7s; }
        .dot:nth-child(19) { animation-delay: 1.8s; }

        .dot:nth-child(23) { animation-delay: 2.2s; }
        .dot:nth-child(24) { animation-delay: 2.3s; }
        .dot:nth-child(25) { animation-delay: 2.4s; }

        .dot:nth-child(56) { animation-delay: 5.5s; }

        .dot:nth-child(58) { animation-delay: 5.7s; }
        .dot:nth-child(59) { animation-delay: 5.8s; }
        .dot:nth-child(60) { animation-delay: 5.9s; }
        .dot:nth-child(61) { animation-delay: 6.0s; }

        .dot:nth-child(74) { animation-delay: 7.3s; }
        .dot:nth-child(75) { animation-delay: 7.4s; }

        /* Pulsing animation */
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 0.4;
                background: #3a3a3a;
                box-shadow: 0 0 15px rgba(100, 100, 100, 0.1);
            }
            50% {
                transform: scale(1.4);
                opacity: 1;
                background: #888888;
                box-shadow: 0 0 30px rgba(150, 150, 150, 0.4);
            }
        }

        /* Hover effect */
        .dot:hover {
            transform: scale(1.8) !important;
            background: #aaaaaa !important;
            box-shadow: 0 0 50px rgba(200, 200, 200, 0.6) !important;
            transition: all 0.15s ease !important;
        }

        /* Glow ring on hover */
        .dot:hover::after {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            border-radius: 50%;
            border: 2px solid rgba(200, 200, 200, 0.3);
            animation: ring 0.8s ease-out infinite;
        }

        @keyframes ring {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(1.8);
                opacity: 0;
            }
        }

        /* Responsive */
        @media (max-width: 700px) {
            .grid-container {
                grid-template-columns: repeat(10, 1fr);
                gap: 15px;
            }
        }

        @media (max-width: 500px) {
            .grid-container {
                grid-template-columns: repeat(7, 1fr);
                gap: 10px;
                padding: 15px;
            }
        }

        /* Title overlay */
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #666;
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0.5;
            font-weight: 300;
            text-align: center;
            pointer-events: none;
        }

        .title span {
            display: block;
            font-size: 10px;
            letter-spacing: 2px;
            margin-top: 5px;
            opacity: 0.3;
        }
    </style>
</head>
